<div class="home-container">
  <h1>Welcome to the Home Page!</h1>

  <div *ngIf="currentUser">
    <p>Hello, {{ currentUser.email }}!</p>
    <button (click)="logout()">Logout</button>
  </div>
  <div *ngIf="!currentUser">
    <p>You are not logged in. Please <a routerLink="/sign-in">sign in</a>.</p>
  </div>
</div>
